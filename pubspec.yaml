name: onyx
description: One-tap VPN client powered by sing-box
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Data / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # Crypto
  crypto: ^3.0.3

  # Network
  dio_cache_interceptor: ^3.5.0

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ── НОВОЕ: открытие ссылок (брендинг by Orion_Z43) ──────────────────────
  url_launcher: ^6.3.0

  # Platform / Process
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1

  # Utils
  logger: ^2.3.0
  intl: ^0.19.0
  window_manager: ^0.5.1
  tray_manager: ^0.5.3
  local_notifier: ^0.1.6
  dio: ^5.9.2
  archive: ^3.4.0
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.9
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  custom_lint: ^0.6.4
  riverpod_lint: ^2.3.10
  mocktail: ^1.0.3

flutter:
  uses-material-design: true
  # assets:
  #   - assets/animations/
  #   - assets/binaries/

