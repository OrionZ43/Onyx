name: onyx
description: One-tap VPN client powered by sing-box
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Data / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # Crypto
  crypto: ^3.0.3

  # Network
  dio_cache_interceptor: ^3.5.0

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # ── НОВОЕ: открытие ссылок (брендинг by Orion_Z43) ──────────────────────
  url_launcher: ^6.3.0

  # Platform / Process
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1
  flutter_v2ray: ^2.1.0

