name: onyx
description: One-tap VPN client powered by sing-box
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Data / serialization
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Storage
  shared_preferences: ^2.3.2
  path_provider: ^2.1.3

  # Crypto
  crypto: ^3.0.3

  # Network
  dio: ^5.4.0
  dio_cache_interceptor: ^3.5.0

  # Navigation
  go_router: ^14.2.7

  # UI
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0

  # Links
  url_launcher: ^6.3.0

  # Platform / Process
  flutter_background_service: ^5.0.5
  permission_handler: ^11.3.1

  # Android VPN
  flutter_v2ray: ^1.0.10


  # Archive extraction (used by BinaryManager on Windows)
  archive: ^3.4.0

  # Path utilities
  path: ^1.9.0

  # Windows-only platform features (must NOT be removed — used in main.dart)
  window_manager: ^0.3.8
  tray_manager: ^0.2.2
  local_notifier: ^0.1.5

  # Android VPN
